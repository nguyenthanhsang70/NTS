<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búa Kéo Bao - NTS</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --win: #4ade80;
            --lose: #fb7185;
            --tie: #fbbf24;
            --text: #f8fafc;
            --shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(56,189,248,0.12) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(244,114,182,0.12) 0%, transparent 25%);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            padding: clamp(1rem, 4vw, 1.5rem);
        }

        .game-container {
            background: rgba(30,41,59,0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: clamp(1.5rem, 5vw, 2rem);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 720px;
        }

        h1 {
            font-size: clamp(2.2rem, 8vw, 3.2rem);
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: clamp(1.5rem, 6vw, 2.5rem);
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 4px 12px rgba(56,189,248,0.25));
        }

        .scoreboard {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
        }

        @media (min-width: 480px) {
            .scoreboard {
                flex-direction: row;
                justify-content: center;
                gap: 1.5rem;
            }
        }

        .score-card {
            background: rgba(15,23,42,0.6);
            padding: clamp(1rem, 4vw, 1.25rem);
            border-radius: 1.25rem;
            border: 1px solid rgba(255,255,255,0.06);
            flex: 1;
            max-width: 220px;
            transition: transform 0.2s ease;
        }

        .score-card:hover {
            transform: translateY(-4px);
        }

        .score-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .score-value {
            font-size: clamp(2.2rem, 8vw, 3.2rem);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .battle-zone {
            background: rgba(0,0,0,0.35);
            border-radius: 1.5rem;
            padding: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .choices-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(1rem, 5vw, 2.5rem);
            opacity: 0;
            transform: scale(0.92);
            transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }

        .choices-display.show {
            opacity: 1;
            transform: scale(1);
        }

        .emoji-box {
            font-size: clamp(4.5rem, 18vw, 7rem);
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .vs-circle {
            width: clamp(50px, 12vw, 70px);
            height: clamp(50px, 12vw, 70px);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(1rem, 4vw, 1.3rem);
            box-shadow: 0 0 25px rgba(244,114,182,0.35);
        }

        .choices-menu {
            display: flex;
            justify-content: center;
            gap: clamp(1rem, 5vw, 1.8rem);
            margin-bottom: clamp(1.5rem, 5vw, 2rem);
        }

        .choice-btn {
            width: clamp(80px, 22vw, 100px);
            height: clamp(80px, 22vw, 100px);
            font-size: clamp(2.8rem, 10vw, 3.5rem);
            border-radius: 1.2rem;
            border: none;
            background: var(--card-bg);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
            touch-action: manipulation;
        }

        .choice-btn:hover {
            transform: translateY(-8px) scale(1.05);
            background: #2d3748;
            box-shadow: 0 16px 35px rgba(56,189,248,0.25);
            border-color: var(--accent-blue);
        }

        .choice-btn:active {
            transform: scale(0.92);
        }

        .result-text {
            font-size: clamp(1.4rem, 6vw, 2rem);
            font-weight: 800;
            margin-top: 1rem;
            min-height: 2.5rem;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .win { color: var(--win); text-shadow: 0 0 15px rgba(74,222,128,0.5); }
        .lose { color: var(--lose); text-shadow: 0 0 15px rgba(251,113,133,0.5); }
        .tie  { color: var(--tie);  text-shadow: 0 0 15px rgba(251,191,36,0.5); }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: clamp(0.8rem, 4vw, 1rem) clamp(1.5rem, 6vw, 2rem);
            border-radius: 1.2rem;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: clamp(0.9rem, 4vw, 1rem);
            min-width: 140px;
        }

        .btn-reset {
            background: white;
            color: black;
        }

        .btn-back {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.92;
        }

        @keyframes shake {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-30px) rotate(-12deg); }
        }

        .shaking {
            animation: shake 0.5s infinite ease-in-out;
        }

        .pulse {
            animation: scorePulse 0.6s ease;
        }

        @keyframes scorePulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        @media (min-width: 768px) {
            .game-container { padding: 3rem 4rem; }
            .battle-zone { min-height: 320px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>BÚA KÉO BAO</h1>

        <div class="scoreboard">
            <div class="score-card">
                <div class="score-label">Bạn</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">Máy</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <div class="battle-zone">
            <div class="choices-display" id="choicesDisplay">
                <div class="emoji-box" id="playerChoice">❓</div>
                <div class="vs-circle">VS</div>
                <div class="emoji-box" id="computerChoice">❓</div>
            </div>
            <div class="result-text" id="result"></div>
        </div>

        <div class="choices-menu">
            <button class="choice-btn" onclick="playGame('rock')">✊</button>
            <button class="choice-btn" onclick="playGame('scissors')">✌️</button>
            <button class="choice-btn" onclick="playGame('paper')">✋</button>
        </div>

        <div class="actions">
            <button class="btn btn-reset" onclick="resetGame()">🔄 Chơi lại</button>
            <a href="game.html" class="btn btn-back">Quay lại</a>
        </div>
    </div>

    <audio id="winSound" src="win.mp3"></audio>
    <audio id="loseSound" src="lose.mp3"></audio>
    <audio id="tieSound" src="tie.mp3"></audio>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        let isPlaying = false;

        const choices = {
            rock: { emoji: '✊', name: 'Búa' },
            paper: { emoji: '✋', name: 'Bao' },
            scissors: { emoji: '✌️', name: 'Kéo' }
        };

        const rules = {
            rock: 'scissors',
            paper: 'rock',
            scissors: 'paper'
        };

        function getComputerChoice(playerChoice) {
            if (playerChoice === 'rock') return 'paper';
            if (playerChoice === 'paper') return 'scissors';
            if (playerChoice === 'scissors') return 'rock';
            return 'rock'; // fallback
        }

        async function playGame(playerChoice) {
            if (isPlaying) return;
            isPlaying = true;

            const resElem = document.getElementById('result');
            const pDisp = document.getElementById('playerChoice');
            const cDisp = document.getElementById('computerChoice');
            const displayArea = document.getElementById('choicesDisplay');

            resElem.textContent = "Oẳn tù tì...";
            resElem.className = "result-text";
            displayArea.classList.add('show');

            pDisp.textContent = '✊';
            cDisp.textContent = '✊';
            pDisp.classList.add('shaking');
            cDisp.classList.add('shaking');

            setTimeout(() => {
                pDisp.classList.remove('shaking');
                cDisp.classList.remove('shaking');

                const computerChoice = getComputerChoice(playerChoice);
                let result = (playerChoice === computerChoice) ? 'tie' :
                             (rules[playerChoice] === computerChoice ? 'win' : 'lose');

                pDisp.textContent = choices[playerChoice].emoji;
                cDisp.textContent = choices[computerChoice].emoji;

                updateScore(result);
                displayResult(result);
                isPlaying = false;
            }, 1200);
        }

        function updateScore(result) {
            const pElem = document.getElementById('playerScore');
            const cElem = document.getElementById('computerScore');

            if (result === 'win') {
                playerScore++;
                pElem.textContent = playerScore;
                pElem.parentElement.classList.add('pulse');
            } else if (result === 'lose') {
                computerScore++;
                cElem.textContent = computerScore;
                cElem.parentElement.classList.add('pulse');
            }

            setTimeout(() => {
                document.querySelectorAll('.score-card').forEach(el => el.classList.remove('pulse'));
            }, 600);
        }

        function displayResult(result) {
            const resElem = document.getElementById('result');
            const winSound  = document.getElementById('winSound');
            const loseSound = document.getElementById('loseSound');
            const tieSound  = document.getElementById('tieSound');

            [winSound, loseSound, tieSound].forEach(s => { s.pause(); s.currentTime = 0; });

            if (result === 'win') {
                resElem.textContent = "CHIẾN THẮNG! 🎉";
                resElem.classList.add('win');
                winSound.play().catch(() => {});
            } else if (result === 'lose') {
                resElem.textContent = "THUA RỒI... 💀";
                resElem.classList.add('lose');
                loseSound.play().catch(() => {});
            } else {
                resElem.textContent = "HÒA! 🤝";
                resElem.classList.add('tie');
                tieSound.play().catch(() => {});
            }
        }

        function resetGame() {
            if (isPlaying) return;
            playerScore = computerScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('result').textContent = '';
            document.getElementById('playerChoice').textContent = '❓';
            document.getElementById('computerChoice').textContent = '❓';
            document.getElementById('choicesDisplay').classList.remove('show');
        }
    </script>
</body>
</html>
