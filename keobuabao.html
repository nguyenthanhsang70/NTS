<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kéo Búa Bao - Ultimate Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --win: #4ade80;
            --lose: #fb7185;
            --tie: #fbbf24;
            --text: #f8fafc;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 114, 182, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
        }
        .game-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 40px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }
        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .score-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .score-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .score-value {
            font-size: 3rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
        .battle-zone {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 40px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .choices-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .choices-display.show {
            opacity: 1;
            transform: scale(1);
        }
        .emoji-box {
            font-size: 6.5rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: 0.3s;
        }
        .vs-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-style: italic;
            font-size: 1.2rem;
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.4);
        }
        .choices-menu {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .choice-btn {
            width: 90px;
            height: 90px;
            border-radius: 28px;
            border: none;
            background: var(--card-bg);
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .choice-btn:hover {
            transform: translateY(-10px);
            background: #2d3748;
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.2);
            border-color: var(--accent-blue);
        }
        .choice-btn:active { transform: scale(0.95); }
        .result-text {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 25px;
            height: 40px;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .win { color: var(--win); text-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
        .lose { color: var(--lose); text-shadow: 0 0 20px rgba(251, 113, 133, 0.4); }
        .tie { color: var(--tie); text-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 16px 32px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-reset { background: white; color: black; }
        .btn-back { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        @keyframes shake {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-40px) rotate(-15deg); }
        }
        .shaking { animation: shake 0.4s infinite ease-in-out; }
        .pulse { animation: scorePulse 0.5s; }
        @keyframes scorePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>BÚA KÉO BAO</h1>
        
        <div class="scoreboard">
            <div class="score-card">
                <div class="score-label">Người chơi</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">Máy tính</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <div class="battle-zone">
            <div class="choices-display" id="choicesDisplay">
                <div class="emoji-box" id="playerChoice">❓</div>
                <div class="vs-circle">VS</div>
                <div class="emoji-box" id="computerChoice">❓</div>
            </div>
            <div class="result-text" id="result"></div>
        </div>

        <div class="choices-menu">
            <button class="choice-btn" onclick="playGame('rock')">✊</button>
            <button class="choice-btn" onclick="playGame('scissors')">✌️</button>
            <button class="choice-btn" onclick="playGame('paper')">✋</button>
        </div>

        <div class="actions">
            <button class="btn btn-reset" onclick="resetGame()">🔄 CHƠI LẠI</button>
            <a href="game.html" class="btn btn-back">QUAY LẠI</a>
        </div>
    </div>

    <audio id="winSound" src="win.mp3"></audio>
    <audio id="loseSound" src="lose.mp3"></audio>
    <audio id="tieSound" src="tie.mp3"></audio>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        let isPlaying = false;

        const choices = {
            rock: { emoji: '✊', name: 'Búa' },
            paper: { emoji: '✋', name: 'Bao' },
            scissors: { emoji: '✌️', name: 'Kéo' }
        };

        const rules = {
            rock: 'scissors',
            paper: 'rock',
            scissors: 'paper'
        };

        function getComputerChoice(playerChoice) {
            // Máy luôn thắng 100%
            if (playerChoice === 'rock') return 'paper';      // Bao thắng Búa
            if (playerChoice === 'paper') return 'scissors';  // Kéo thắng Bao
            if (playerChoice === 'scissors') return 'rock';   // Búa thắng Kéo
            // fallback (không bao giờ đến)
            return 'rock';
        }

        async function playGame(playerChoice) {
            if (isPlaying) return;
            isPlaying = true;

            const resElem = document.getElementById('result');
            const pDisp = document.getElementById('playerChoice');
            const cDisp = document.getElementById('computerChoice');
            const displayArea = document.getElementById('choicesDisplay');

            // Reset UI
            resElem.textContent = "Oẳn tù tì...";
            resElem.className = "result-text";
            displayArea.classList.add('show');

            pDisp.textContent = '✊';
            cDisp.textContent = '✊';
            pDisp.classList.add('shaking');
            cDisp.classList.add('shaking');

            // Lắc tay 1.2 giây
            setTimeout(() => {
                pDisp.classList.remove('shaking');
                cDisp.classList.remove('shaking');

                const computerChoice = getComputerChoice(playerChoice);
                let result = '';

                // Vì máy luôn chọn cái thắng → result luôn là 'lose' cho người chơi
                // (không cần kiểm tra lại logic nữa, nhưng vẫn giữ để code rõ ràng)
                if (playerChoice === computerChoice) result = 'tie';
                else result = rules[playerChoice] === computerChoice ? 'win' : 'lose';

                pDisp.textContent = choices[playerChoice].emoji;
                cDisp.textContent = choices[computerChoice].emoji;

                updateScore(result);
                displayResult(result);

                isPlaying = false;
            }, 1200);
        }

        function updateScore(result) {
            const pElem = document.getElementById('playerScore');
            const cElem = document.getElementById('computerScore');

            if (result === 'win') {
                playerScore++;
                pElem.textContent = playerScore;
                pElem.parentElement.classList.add('pulse');
            } else if (result === 'lose') {
                computerScore++;
                cElem.textContent = computerScore;
                cElem.parentElement.classList.add('pulse');
            }

            setTimeout(() => {
                pElem.parentElement.classList.remove('pulse');
                cElem.parentElement.classList.remove('pulse');
            }, 500);
        }

        function displayResult(result) {
            const resElem = document.getElementById('result');
            const winSound = document.getElementById('winSound');
            const loseSound = document.getElementById('loseSound');
            const tieSound = document.getElementById('tieSound');

            [winSound, loseSound, tieSound].forEach(s => { s.pause(); s.currentTime = 0; });

            if (result === 'win') {
                resElem.textContent = "CHIẾN THẮNG! 🎉";
                resElem.classList.add('win');
                winSound.play().catch(() => {});
            } else if (result === 'lose') {
                resElem.textContent = "THẤT BẠI... 💀";
                resElem.classList.add('lose');
                loseSound.play().catch(() => {});
            } else {
                resElem.textContent = "HÒA NHAU! 🤝";
                resElem.classList.add('tie');
                tieSound.play().catch(() => {});
            }
        }

        function resetGame() {
            if (isPlaying) return;
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('result').textContent = '';
            document.getElementById('playerChoice').textContent = '❓';
            document.getElementById('computerChoice').textContent = '❓';
            document.getElementById('choicesDisplay').classList.remove('show');
        }
    </script>
</body>
</html>
